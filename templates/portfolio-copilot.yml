# =============================================================================
# spec-kit-schedule — GitHub Copilot Portfolio (v0.6.x)
# =============================================================================
# Used as the starter portfolio when ``solver.autodetect`` resolves the
# integration key to ``copilot``. Models reflect what GitHub Copilot
# Pro / Enterprise exposes as of 2026-05-07 (GPT-5.4, GPT-5.4-mini,
# o4-mini). Verify the current model list at
# https://docs.github.com/en/copilot/about-github-copilot/plans-for-github-copilot.
#
# Pricing note: GitHub Copilot is bundled (Pro $10/mo, Enterprise
# $39/mo) — the actual cost the user pays is the subscription, NOT
# the per-token figure. The ``price_per_1k_tokens`` fields below are
# NOTIONAL: they reflect each underlying model's list price so
# ``cost_aware`` mode can rank Copilot tiers correctly relative to
# other portfolios (and relative to each other), but they do NOT
# represent real spend on a Copilot subscription. Set all to 0.0 if
# you only care about makespan / load balance and stay on
# ``objective: lexicographic`` (the default below).
#
# Tier framework: see ``docs/formulation.md`` ("Hallucination
# Calibration") for κ / context_budget envelopes.
# =============================================================================

agents:
  - id: gpt5
    provider: openai
    model: gpt-5.5                  # latest GA flagship (2026-04-24)
    skills: [design, schema, review, architecture]
    kappa: 8                 # Frontier-ish (slightly above Opus floor)
    context_budget: 24
    speed_factor: 1.2
    price_per_1k_tokens: 0.005     # $5/MTok — notional (bundled in Copilot)

  - id: gpt5-mini
    provider: openai
    model: gpt-5.4-mini
    skills: [python, backend, frontend, impl, api, test]
    kappa: 12                # Mid tier
    context_budget: 16
    speed_factor: 1.8
    price_per_1k_tokens: 0.00075   # $0.75/MTok

  - id: o4-mini
    provider: openai
    model: o4-mini
    skills: [refactor, optimize, debug]
    kappa: 8                 # Reasoning model — careful, lower κ
    context_budget: 12
    speed_factor: 1.0
    price_per_1k_tokens: 0.0011    # $1.10/MTok

solver:
  objective: lexicographic
  time_limit: 60
  num_workers: 4
