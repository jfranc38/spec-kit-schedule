[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "spec-kit-schedule"
version = "0.4.1"
description = "Optimal multi-agent task scheduling via CP-SAT (spec-kit extension)"
readme = "README.md"
requires-python = ">=3.10,<4.0"
license = { text = "MIT" }
authors = [
    { name = "Julio César Franco Ardila" },
]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Software Development :: Build Tools",
]
dependencies = [
    "ortools>=9.9,<10",
    "PyYAML>=6,<7",
    "networkx>=3.1,<4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.5",
    "mypy>=1.10",
]
viz = [
    "matplotlib>=3.7,<4",
    "pydot>=2.0,<3",
]

[project.scripts]
speckit-schedule-parse = "solver.parse_tasks:main"
speckit-schedule-solve = "solver.scheduler:main"
speckit-schedule-render = "solver.render_schedule:main"

[tool.setuptools.packages.find]
include = ["solver*"]
exclude = ["tests*", "docs*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "C4"]
ignore = ["E501"]  # long lines caught separately via line-length

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
filterwarnings = ["error"]

[tool.mypy]
python_version = "3.10"
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = false
ignore_missing_imports = true
