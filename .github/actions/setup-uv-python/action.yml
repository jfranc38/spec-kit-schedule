name: "Setup uv + Python"
description: "Install uv, install Python, and sync project deps with the requested extras."
inputs:
  python-version:
    description: "Python version to install (e.g. '3.12' or '${{ matrix.python-version }}')"
    required: true
  extras:
    description: "Comma-separated list of project extras to sync (e.g. 'dev,viz'). Empty for no extras."
    required: false
    default: "dev"
  enable-cache:
    description: "Whether to enable uv cache."
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: ${{ inputs.enable-cache }}
        cache-dependency-glob: "uv.lock"
    - name: Set Python version
      shell: bash
      run: uv python install ${{ inputs.python-version }}
    - name: Sync dependencies (frozen)
      shell: bash
      run: |
        extras_args=""
        IFS=',' read -ra ADDR <<< "${{ inputs.extras }}"
        for e in "${ADDR[@]}"; do
          if [ -n "$e" ]; then
            extras_args="$extras_args --extra $e"
          fi
        done
        uv sync --frozen $extras_args
