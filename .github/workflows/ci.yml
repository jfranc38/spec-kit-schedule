name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (frozen, dev + viz)
        run: uv sync --frozen --extra dev --extra viz

      - name: Lint
        run: uv run ruff check solver tests

      - name: Typecheck (non-blocking)
        run: uv run mypy solver
        continue-on-error: true

      - name: Tests with coverage
        run: uv run pytest --cov=solver --cov-report=term-missing

      - name: Smoke test (docs example)
        run: make smoke

      - name: Zip install flow
        if: matrix.python-version == '3.12'
        run: |
          # Exercise the teammate install path: package → extract → install.sh.
          make package
          tmp=$(mktemp -d)
          unzip -q dist/spec-kit-schedule.zip -d "$tmp/extract"
          pushd "$tmp/extract"
          ls -1
          ./bin/install.sh
          popd
