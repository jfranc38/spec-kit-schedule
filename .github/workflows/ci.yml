name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }} / ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          # CI-G7: keep ubuntu primary, but exercise macOS at one Python.
          # OR-Tools occasionally has macOS-specific issues; allow this
          # combination to fail without blocking the merge.
          - os: macos-latest
            python-version: "3.12"
            allow-failure: true
    continue-on-error: ${{ matrix.allow-failure == true }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv + Python
        uses: ./.github/actions/setup-uv-python
        with:
          python-version: ${{ matrix.python-version }}
          extras: "dev,viz"

      - name: Lint
        run: uv run ruff check solver tests

      - name: Typecheck (strict on newly-typed modules)
        run: uv run mypy --strict solver/scheduler.py solver/parse_tasks.py

      - name: Typecheck (full solver package)
        run: uv run mypy solver

      - name: Tests with coverage
        # CI-G5: gate at 90% — coverage observed locally at 92% with viz extras.
        run: uv run pytest --cov=solver --cov-report=term-missing --cov-fail-under=90

      - name: Smoke test (docs example)
        run: make smoke

  workflow-lint:
    name: Lint workflows + shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: actionlint
        # CI-G1: blocking. Pinned action; sources actionlint binary.
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

      - name: shellcheck
        # CI-G2: blocking. Lint the shell scripts shipped in the repo.
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          additional_files: "bin/install.sh bin/uninstall.sh"
          ignore_paths: ".venv .git dist"

  security:
    name: Dependency audit + license report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv + Python
        uses: ./.github/actions/setup-uv-python
        with:
          python-version: "3.12"
          extras: "dev"

      - name: pip-audit
        # CI-G3: pip-audit runs warn-only; review the security job artifact
        # and triage findings periodically.
        continue-on-error: true
        run: uv run --with pip-audit pip-audit --strict --progress-spinner=off

      - name: pip-licenses
        # CI-G4: non-blocking. Generate a markdown license report and upload.
        run: |
          uv run --with pip-licenses pip-licenses \
            --format=markdown \
            --with-urls \
            --output-file=licenses.md

      - name: Upload license report
        uses: actions/upload-artifact@v7
        with:
          name: licenses-report
          path: licenses.md
          if-no-files-found: error
          retention-days: 30

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv + Python
        uses: ./.github/actions/setup-uv-python
        with:
          python-version: "3.12"
          extras: "dev"

      - name: Build wheel
        run: uv build

      - name: Verify wheel asset payload
        run: bash -c '.github/scripts/verify-zip-assets.sh dist/*.whl'

      - name: Zip install flow
        run: |
          # Exercise the teammate install path: package -> extract -> install.sh.
          make package
          tmp=$(mktemp -d)
          unzip -q dist/spec-kit-schedule.zip -d "$tmp/extract"
          pushd "$tmp/extract"
          ls -1
          ./bin/install.sh
          popd

  benchmark-smoke:
    name: Benchmark smoke (tiny)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Decide whether to run
        id: gate
        # Always run on push to master; on PRs run only when solver/ or benchmarks/
        # paths changed. Sets steps.gate.outputs.run = "true" | "false".
        # On git fetch failure, fail-OPEN (run=true) so coverage isn't silently dropped.
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git fetch --no-tags --depth=1 origin "$base" 2>/dev/null; then
            if git diff --name-only "$base" "$head" | grep -E '^(solver/|benchmarks/)' >/dev/null; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
              echo "No solver/ or benchmarks/ changes — skipping benchmark smoke."
            fi
          else
            echo "::warning::git fetch failed — running benchmark smoke conservatively."
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup uv + Python
        if: steps.gate.outputs.run == 'true'
        uses: ./.github/actions/setup-uv-python
        with:
          python-version: "3.12"
          extras: "dev"

      - name: Run tiny benchmark
        if: steps.gate.outputs.run == 'true'
        # Gate is "the harness still works" — no Gap%/wall-time assertions.
        run: uv run python -m benchmarks.run --size tiny --time-limit 10

      - name: Upload benchmark artifacts
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-smoke-tiny
          path: |
            benchmarks/results/*.json
            benchmarks/results/latest.md
          retention-days: 14
          if-no-files-found: error

  smoke-stress:
    name: Smoke stress (medium)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # CI-G6: a small step up from the tiny smoke; runs only on push to master
    # to keep PR cycle time bounded. Times out at 10 minutes.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv + Python
        uses: ./.github/actions/setup-uv-python
        with:
          python-version: "3.12"
          extras: "dev"

      - name: Run medium smoke stress
        run: make smoke-stress

      - name: Upload smoke-stress artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-stress-medium
          path: |
            benchmarks/results/*.json
            benchmarks/results/latest.md
          if-no-files-found: ignore
          retention-days: 14
