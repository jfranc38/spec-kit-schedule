# Example portfolio. The scheduler is provider-agnostic: `provider` and
# `model` are informational strings the executor (e.g. /speckit.implement,
# MAQA coordinator, custom orchestrator) uses to route each task to the
# right runner. Mix providers freely — see docs/example-config-mixed.yml
# for a more diverse example.

agents:
  - id: "architect"
    provider: "anthropic"
    model: "claude-opus-4"
    skills: ["design", "review", "schema", "architecture"]
    kappa: 8
    context_budget: 48
    speed_factor: 0.8
    price_per_1k_tokens: 0.015   # claude-opus-4 input price per 1K tokens (2026)

  - id: "backend-1"
    provider: "openai"
    model: "gpt-4o"
    skills: ["python", "backend", "api", "database", "schema"]
    kappa: 12
    context_budget: 32
    speed_factor: 1.0
    price_per_1k_tokens: 0.0025  # gpt-4o input price per 1K tokens (2026)

  - id: "backend-2"
    provider: "anthropic"
    model: "claude-sonnet-4"
    skills: ["python", "backend", "api", "database", "schema"]
    kappa: 12
    context_budget: 32
    speed_factor: 1.0
    price_per_1k_tokens: 0.003

  - id: "frontend"
    provider: "google"
    model: "gemini-2.0-pro"
    skills: ["frontend", "react", "css", "html", "javascript"]
    kappa: 10
    context_budget: 32
    speed_factor: 1.0
    price_per_1k_tokens: 0.00125  # gemini-2.0-pro estimated input price per 1K tokens (2026)

  - id: "tester"
    provider: "anthropic"
    model: "claude-haiku-4.5"
    skills: ["test", "e2e", "contract-test", "unit-test"]
    kappa: 15
    context_budget: 24
    speed_factor: 1.5
    price_per_1k_tokens: 0.0008  # claude-haiku-4.5 input price per 1K tokens (2026)

skill_rules:
  - pattern: "tests/"
    skill: "test"
  - pattern: "test_"
    skill: "test"
  - pattern: ".test."
    skill: "test"
  - pattern: "src/models/"
    skill: "schema"
  - pattern: "migrations/"
    skill: "schema"
  - pattern: "src/api/"
    skill: "api"
  - pattern: "src/services/"
    skill: "backend"
  - pattern: "src/components/"
    skill: "frontend"
  - pattern: "src/pages/"
    skill: "frontend"
  - pattern: ".tsx"
    skill: "frontend"
  - pattern: ".jsx"
    skill: "frontend"
  - pattern: "docs/"
    skill: "review"
  - pattern: ".md"
    skill: "review"

default_skill: "backend"

token_estimates:
  simple: 1500
  medium: {mean: 3500, std_dev: 500}   # dict form: enables stochastic scheduling
  complex: 6000
  review: 2000

complexity_verbs:
  simple: ["add", "update", "rename", "move", "import", "export", "configure"]
  medium: ["implement", "create", "write", "build", "refactor"]
  complex: ["design", "architect", "integrate", "migrate", "optimize"]
  review: ["review", "validate", "verify", "analyze", "audit"]

solver:
  objective: "lexicographic"
  makespan_weight: 100
  time_limit: 60
  num_workers: 8
  symmetry_breaking: true
  warm_start: true
