# Realistic-price reference config: a 5-agent portfolio mixing Anthropic
# Claude, GitHub Copilot, Google Gemini, OpenAI, and a locally-hosted
# Ollama model. The scheduler is provider-agnostic — `model` and `provider`
# fields are informational and propagated to schedule.md so downstream
# executors (e.g. MAQA coordinator, /speckit.implement) can route each
# task to the right runner.
#
# Pricing here uses real 2026 list-price scale (e.g. $0.015 / 1K input
# tokens for claude-opus-4). For an end-to-end runnable scenario whose
# numbers actually exercise the cost-vs-makespan trade-off in `make
# examples`, see `examples/04-multi-provider/` — that config scales
# prices up ~1000× so a 14-task toy problem produces a visibly
# differentiated solution.
#
# The κ / context_budget / speed_factor values below are STARTING estimates.
# Re-calibrate against your real benchmarks; defaults are biased toward the
# current generation of frontier models.

agents:
  - id: "architect"
    provider: "anthropic"
    model: "claude-opus-4"
    skills: ["design", "review", "schema", "architecture"]
    kappa: 6
    context_budget: 40
    speed_factor: 0.8
    price_per_1k_tokens: 0.015   # claude-opus-4 input price per 1K tokens (2026)

  - id: "backend"
    provider: "openai"
    model: "gpt-5"
    skills: ["python", "backend", "api", "database", "schema"]
    kappa: 10
    context_budget: 24
    speed_factor: 1.0
    price_per_1k_tokens: 0.005   # gpt-5 estimated input price per 1K tokens (2026)

  - id: "frontend"
    provider: "github"
    model: "copilot-gpt-4.1"
    skills: ["frontend", "react", "css", "html", "javascript"]
    kappa: 10
    context_budget: 16
    speed_factor: 1.0
    price_per_1k_tokens: 0.002   # copilot-gpt-4.1 estimated input price per 1K tokens (2026)

  - id: "tester"
    provider: "google"
    model: "gemini-2.5-flash"
    skills: ["test", "e2e", "contract-test", "unit-test"]
    kappa: 18
    context_budget: 12
    speed_factor: 1.4
    price_per_1k_tokens: 0.0001  # gemini-2.5-flash estimated input price per 1K tokens (2026)

  - id: "local-assistant"
    provider: "ollama"
    model: "qwen2.5-coder:32b"
    skills: ["review", "docs"]
    kappa: 8
    context_budget: 16
    speed_factor: 0.6
    price_per_1k_tokens: 0.0     # self-hosted: no per-token cost

skill_rules:
  - pattern: "tests/"
    skill: "test"
  - pattern: "_test."
    skill: "test"
  - pattern: "src/models/"
    skill: "schema"
  - pattern: "migrations/"
    skill: "schema"
  - pattern: "src/api/"
    skill: "api"
  - pattern: "src/services/"
    skill: "backend"
  - pattern: "src/components/"
    skill: "frontend"
  - pattern: "src/pages/"
    skill: "frontend"
  - pattern: ".tsx"
    skill: "frontend"
  - pattern: ".jsx"
    skill: "frontend"
  - pattern: "docs/"
    skill: "docs"
  - pattern: ".md"
    skill: "review"

default_skill: "backend"

token_estimates:
  simple:   1500
  medium:   {mean: 3500, std_dev: 500}   # dict form: enables stochastic scheduling
  complex:  6000
  review:   2000

complexity_verbs:
  simple:  ["add", "update", "rename", "move", "import", "export", "configure"]
  medium:  ["implement", "create", "write", "build", "refactor"]
  complex: ["design", "architect", "integrate", "migrate", "optimize"]
  review:  ["review", "validate", "verify", "analyze", "audit"]

solver:
  objective: "lexicographic"
  time_limit: 60
  num_workers: 8
  symmetry_breaking: true
  warm_start: true
  horizon_multiplier: 1.5
  token_unit: 100
